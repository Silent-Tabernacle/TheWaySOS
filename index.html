<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WAY SOS | Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fauna One', serif; background-color: #0c0a09; color: #d6d3d1; }
        .altar-font { font-family: 'Cinzel', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <header class="flex justify-between items-center border-b border-stone-800 pb-4 mb-6">
        <div class="flex items-center gap-3">
            <h1 class="text-xl md:text-2xl font-bold tracking-widest text-stone-100 uppercase altar-font">The Way SOS</h1>
        </div>
        <div id="timer" class="font-mono text-amber-500 bg-stone-900 px-4 py-2 rounded-full border border-stone-700">10:00</div>
    </header>

    <main class="flex-1 max-w-4xl mx-auto w-full flex flex-col gap-6 overflow-hidden">
        <div id="chat-box" class="bg-stone-900/50 border border-stone-800 rounded-lg p-6 flex-1 overflow-y-auto space-y-6 scrollbar-hide">
            <div class="text-center py-12 space-y-4">
                <h2 class="text-xl text-stone-400 italic">"Be still, and know that I am God..."</h2>
                <p class="text-stone-500 max-w-md mx-auto text-sm">The Sanctuary is live. The Scout is waiting. How shall we begin the Team Labor?</p>
            </div>
        </div>

        <div class="relative">
            <textarea id="user-input" placeholder="Type your struggle or mission update..." 
                class="w-full bg-stone-900 border border-stone-700 rounded-2xl p-4 pr-16 focus:border-amber-700 transition-all outline-none resize-none h-24 shadow-2xl text-stone-200"></textarea>
            <button onclick="handleSend()" id="send-btn" class="absolute right-4 bottom-4 p-2 bg-amber-700 hover:bg-amber-600 rounded-xl transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </main>

    <script>
        // 10-MINUTE TIMER
        let time = 600;
        const timerEl = document.getElementById('timer');
        setInterval(() => {
            if (time > 0) {
                time--;
                let mins = Math.floor(time / 60);
                let secs = time % 60;
                timerEl.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);

        // THE CEREBRAL PORT (AI LOGIC)
        async function handleSend() {
            const inputEl = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const btn = document.getElementById('send-btn');
            const text = inputEl.value.trim();

            if (!text) return;

            // Add User Message
            chatBox.innerHTML += `<div class="flex justify-end"><div class="max-w-[85%] p-4 rounded-xl bg-amber-900/20 border border-amber-800/50 text-stone-100"><span class="text-[10px] uppercase tracking-widest opacity-50 block mb-1">Steward</span>${text}</div></div>`;
            inputEl.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Show Loading
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="text-stone-500 italic animate-pulse text-sm">Bez is sifting your words...</div>`;
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer YOUR_API_KEY_HERE`, // Netlify will handle this or we will swap it
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are the Bez Scribe for THE WAY SOS. Embody the Peace-Pace. Use NKJV scripture. Help the Steward navigate the 13-Step Mandate. If the user mentions stress or hurry, trigger [GETHSEMANE_GUARD]. Be concise, prophetic, and supportive." },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="flex justify-start"><div class="max-w-[85%] p-4 rounded-xl bg-stone-800 border border-stone-700 text-stone-200"><span class="text-[10px] uppercase tracking-widest opacity-50 block mb-1">Bez Scribe</span>${reply}</div></div>`;
            } catch (e) {
                document.getElementById(loadingId).innerText = "[SENTRY ERROR]: The vault connection failed. Check your API key.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
