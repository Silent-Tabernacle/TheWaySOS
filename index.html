<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WAY SOS | Supreme Sanctuary</title>
    <style>
        :root {
            --parchment: #f4f1ea;
            --stone: #2c2c2c;
            --gold: #b89b5e;
            --dust: #8c8c8c;
        }
        body {
            background-color: var(--parchment);
            color: var(--stone);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }
        /* The Breathing Animation (6 breaths per minute) */
        #breathing-text {
            font-size: 2rem;
            font-style: italic;
            text-align: center;
            animation: breathe 10s ease-in-out infinite;
            opacity: 0.7;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        /* The Revelation Fades */
        #revelation {
            text-align: center;
            opacity: 0;
            transition: opacity 3s ease-in;
            position: absolute;
        }
        #revelation h1 { font-weight: normal; font-size: 1.5rem; }
        /* The Ebenezer Anchor */
        #ebenezer {
            position: fixed;
            bottom: 20px;
            color: var(--gold);
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 5s ease-in;
        }
    </style>
</head>
<body>

    <div id="breathing-text">Be Still</div>

    <div id="revelation">
        <h1>"...and know that I am God"</h1>
        <p style="color: var(--dust);">Psalm 46:10 (NASB)</p>
    </div>

    <div id="ebenezer">I AM GOD</div>

    <script>
        // The Supreme Logic (Station 04)
        setTimeout(() => {
            // Fade out the breathing cue, fade in the revelation
            document.getElementById('breathing-text').style.display = 'none';
            document.getElementById('revelation').style.opacity = '1';
            document.getElementById('ebenezer').style.opacity = '0.4';
        }, 30000); // 30-Second Threshold
    </script>
</body>
</html>
