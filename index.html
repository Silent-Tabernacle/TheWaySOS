<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WAY SOS | The Sanctuary</title>
    <style>
        :root {
            --parchment: #f4f1ea;
            --stone: #2c2c2c;
            --gold: #b89b5e;
            --dust: #8c8c8c;
        }
        body {
            background-color: var(--parchment);
            color: var(--stone);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif;
            padding: 40px;
            text-align: center;
        }
        /* The Breathing Cue (Station 04) */
        #breathing-text {
            font-size: 1.8rem;
            font-style: italic;
            animation: breathe 10s ease-in-out infinite;
            opacity: 0.6;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.7; }
        }
        /* The Full Verse Revelation */
        #revelation {
            opacity: 0;
            display: none;
            transition: opacity 4s ease-in;
            max-width: 700px;
        }
        .verse-text { 
            font-size: 1.7rem; 
            line-height: 1.8; 
            margin-bottom: 30px;
            font-style: italic;
        }
        .reference { 
            color: var(--gold); 
            letter-spacing: 0.15rem; 
            font-size: 1rem; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="breathing-text">Be still...</div>

    <div id="revelation">
        <div class="verse-text">
            "Cease striving and know that I am God; <br>
            I will be exalted among the nations, <br>
            I will be exalted in the earth."
        </div>
        <div class="reference">— PSALM 46:10 (NASB)</div>
    </div>

    <script>
        // The 30-Second Holy Pause (Recalibration)
        setTimeout(() => {
            const cue = document.getElementById('breathing-text');
            const rev = document.getElementById('revelation');
            
            cue.style.display = 'none';
            rev.style.display = 'block';
            setTimeout(() => { rev.style.opacity = '1'; }, 100);
        }, 30000); 
    </script>
</body>
</html>
